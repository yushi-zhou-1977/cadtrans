<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CadTrans - 管理员后台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: #f0ece4; min-height: 100vh; }
        .login-container { display: flex; align-items: center; justify-content: center; height: 100vh; background: linear-gradient(135deg, #1a3a2a 0%, #2d5a3f 100%); }
        .login-box { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); width: 400px; }
        .login-box h2 { text-align: center; color: #1a3a2a; margin-bottom: 30px; font-size: 1.8rem; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #555; font-weight: bold; }
        .form-group input, .form-group select { width: 100%; padding: 12px 15px; border: 2px solid #ddd; border-radius: 8px; font-size: 1rem; transition: border-color 0.3s; }
        .form-group input:focus, .form-group select:focus { border-color: #c8a45a; outline: none; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: all 0.3s; }
        .btn-primary { background: linear-gradient(135deg, #c8a45a 0%, #a8883e 100%); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(200, 164, 90, 0.4); }
        .btn-success { background: #2d5a3f; color: white; }
        .btn-success:hover { background: #1a3a2a; }
        .btn-danger { background: #c0392b; color: white; }
        .btn-danger:hover { background: #a93226; }
        .btn-warning { background: #c8a45a; color: white; }
        .btn-warning:hover { background: #a8883e; }
        .btn-sm { padding: 10px 25px; font-size: 1rem; display: inline-block; width: auto; }
        .error { color: #c0392b; margin-top: 10px; text-align: center; }
        .dashboard { display: none; }
        .dashboard-header { background: linear-gradient(135deg, #1a3a2a 0%, #2d5a3f 100%); color: white; padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; }
        .dashboard-header h1 { font-size: 1.5rem; }
        .dashboard-header .logout-btn { background: rgba(255,255,255,0.2); color: white; padding: 8px 20px; border-radius: 20px; text-decoration: none; font-size: 0.9rem; cursor: pointer; }
        .dashboard-header .logout-btn:hover { background: rgba(255,255,255,0.3); }
        .dashboard-content { padding: 30px; max-width: 1200px; margin: 0 auto; }
        .card { background: white; border-radius: 12px; padding: 25px; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .card h3 { color: #1a3a2a; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid #c8a45a; }
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        table th, table td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        table th { background: #f5f1ea; font-weight: bold; color: #1a3a2a; }
        table tr:hover { background: #f5f1ea; }
        .key-display { background: #1a3a2a; color: #e2e8f0; padding: 15px; border-radius: 8px; font-family: 'Courier New', monospace; font-size: 1.1rem; text-align: center; margin: 15px 0; word-break: break-all; white-space: pre-wrap; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .stat-item { background: white; border-radius: 12px; padding: 25px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .stat-item .number { font-size: 2.5rem; color: #c8a45a; font-weight: bold; }
        .stat-item .label { color: #666; margin-top: 5px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; padding: 30px; border-radius: 12px; width: 90%; max-width: 500px; }
        .modal-content h3 { margin-bottom: 20px; color: #1a3a2a; }
    </style>
</head>
<body>
    <div class="login-container" id="login-container">
        <div class="login-box">
            <h2>管理员登录</h2>
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="username" placeholder="请输入用户名">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" placeholder="请输入密码">
            </div>
            <button class="btn btn-primary" onclick="login()">登录</button>
            <div class="error" id="login-error"></div>
        </div>
    </div>

    <div class="dashboard" id="dashboard">
        <div class="dashboard-header">
            <h1>CadTrans 管理后台</h1>
            <a class="logout-btn" onclick="logout()">退出登录</a>
        </div>
        <div class="dashboard-content">
            <div class="stats">
                <div class="stat-item">
                    <div class="number" id="stat-total">0</div>
                    <div class="label">总许可证数</div>
                </div>
                <div class="stat-item">
                    <div class="number" id="stat-active">0</div>
                    <div class="label">活跃许可证</div>
                </div>
                <div class="stat-item">
                    <div class="number" id="stat-expired">0</div>
                    <div class="label">已过期</div>
                </div>
            </div>

            <div class="card">
                <h3>生成新许可证</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>许可证类型</label>
                        <select id="type-select">
                            <option value="daily_5k">日卡-5K (10元/天) - 5000字符/天</option>
                            <option value="daily_50k">日卡-50K (50元/天) - 50000字符/天</option>
                            <option value="monthly_5k">月卡-5K (150元/月) - 5000字符/天</option>
                            <option value="monthly_50k">月卡-50K (750元/月) - 50000字符/天</option>
                            <option value="yearly_5k" selected>年卡-5K (900元/年) - 5000字符/天</option>
                            <option value="yearly_50k">年卡-50K (4500元/年) - 50000字符/天</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>用户邮箱（50K套餐必填）</label>
                        <input type="email" id="email-input" placeholder="用户邮箱地址">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>机器指纹码（必填，由用户提供）</label>
                        <input type="text" id="fingerprint-input" placeholder="用户在CAD插件中显示的指纹码" style="font-family: monospace;">
                    </div>
                    <div class="form-group">
                        <label>备注</label>
                        <input type="text" id="note-input" placeholder="用户备注信息">
                    </div>
                </div>
                <button class="btn btn-success btn-sm" onclick="generateKey()">生成许可证</button>
                <div id="generated-key" class="key-display" style="display:none;"></div>
            </div>

            <div class="card">
                <h3>许可证列表</h3>
                <table>
                    <thead>
                        <tr>
                            <th>密钥</th>
                            <th>类型</th>
                            <th>额度</th>
                            <th>有效期至</th>
                            <th>状态</th>
                            <th>邮箱</th>
                            <th>绑定机器</th>
                            <th>备注</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="license-table">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal" id="reset-modal">
        <div class="modal-content">
            <h3>重置机器绑定</h3>
            <p>确定要重置此许可证的机器绑定吗？用户将可以在新电脑上激活。</p>
            <button class="btn btn-danger" onclick="confirmReset()">确认重置</button>
            <button class="btn" style="margin-left:10px;background:#ccc;" onclick="closeModal()">取消</button>
        </div>
    </div>

    <div class="modal" id="delete-modal">
        <div class="modal-content">
            <h3>删除许可证</h3>
            <p style="color:#c0392b;margin-bottom:16px;">警告：此操作不可恢复！许可证将被永久删除。</p>
            <p>请输入密钥后6位以确认删除：<span id="delete-key-hint" style="font-family:monospace;font-weight:bold;"></span></p>
            <input type="text" id="delete-confirm-input" placeholder="输入密钥后6位" style="width:100%;padding:10px;margin:10px 0;border:2px solid #ddd;border-radius:6px;font-family:monospace;">
            <button class="btn btn-danger" onclick="confirmDelete()">确认删除</button>
            <button class="btn" style="margin-left:10px;background:#ccc;" onclick="closeDeleteModal()">取消</button>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let currentResetKey = '';
        let currentDeleteKey = '';

        function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            fetch(`${API_BASE}/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    localStorage.setItem('token', data.token);
                    document.getElementById('login-container').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'block';
                    loadStats();
                    loadLicenses();
                } else {
                    document.getElementById('login-error').textContent = data.message || '登录失败';
                }
            })
            .catch(() => {
                document.getElementById('login-error').textContent = '网络错误';
            });
        }

        function logout() {
            localStorage.removeItem('token');
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('login-container').style.display = 'flex';
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
        }

        function getHeaders() {
            return {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${localStorage.getItem('token')}`
            };
        }

        function loadStats() {
            fetch(`${API_BASE}/stats`, { headers: getHeaders() })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    document.getElementById('stat-total').textContent = data.total;
                    document.getElementById('stat-active').textContent = data.active;
                    document.getElementById('stat-expired').textContent = data.expired;
                }
            });
        }

        function loadLicenses() {
            const typeLabels = {
                daily_5k: '日卡-5K', daily_50k: '日卡-50K',
                monthly_5k: '月卡-5K', monthly_50k: '月卡-50K',
                yearly_5k: '年卡-5K', yearly_50k: '年卡-50K',
                legacy: '旧版'
            };
            fetch(`${API_BASE}/licenses`, { headers: getHeaders() })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    const tbody = document.getElementById('license-table');
                    tbody.innerHTML = '';
                    data.licenses.forEach(lic => {
                        const tr = document.createElement('tr');
                        const typeLabel = typeLabels[lic.type] || lic.type || '旧版';
                        const quotaLabel = lic.dailyQuota ? (lic.dailyQuota >= 50000 ? '5万/天' : '5千/天') : '-';
                        const statusColor = lic.status === 'active' ? '#28a745' : '#dc3545';
                        const statusText = lic.status === 'active' ? '活跃' : '已禁用';
                        const fpDisplay = lic.fingerprint ? (lic.fingerprint.length > 12 ? lic.fingerprint.substring(0, 12) + '...' : lic.fingerprint) : '未绑定';
                        tr.innerHTML = `
                            <td style="font-family: monospace;">${lic.key}</td>
                            <td>${typeLabel}</td>
                            <td>${quotaLabel}</td>
                            <td>${lic.expireDate}</td>
                            <td><span style="color: ${statusColor}">${statusText}</span></td>
                            <td style="color:#1a3a2a;">${lic.email || '-'}</td>
                            <td style="font-family:monospace;font-size:0.85em;">${fpDisplay}</td>
                            <td>${lic.note || '-'}</td>
                            <td>
                                <button class="btn btn-warning btn-sm" onclick="showResetModal('${lic.key}')" style="margin-right:3px;margin-bottom:3px;">重置</button>
                                <button class="btn btn-danger btn-sm" onclick="disableKey('${lic.key}')" style="margin-right:3px;margin-bottom:3px;">禁用</button>
                                <button class="btn btn-sm" onclick="showDeleteModal('${lic.key}')" style="background:#6c757d;color:white;margin-bottom:3px;">删除</button>
                            </td>
                        `;
                        tbody.appendChild(tr);
                    });
                }
            });
        }

        function generateKey() {
            const type = document.getElementById('type-select').value;
            const note = document.getElementById('note-input').value;
            const fingerprint = document.getElementById('fingerprint-input').value.trim();
            const email = document.getElementById('email-input').value.trim();
            if (!fingerprint) {
                alert('请输入用户提供的机器指纹码');
                return;
            }
            if ((type === 'daily_50k' || type === 'monthly_50k' || type === 'yearly_50k') && !email) {
                alert('50K套餐必须填写用户邮箱');
                return;
            }
            fetch(`${API_BASE}/generate`, {
                method: 'POST',
                headers: getHeaders(),
                body: JSON.stringify({ type, note, fingerprint, email })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    const typeLabels = {
                        daily_5k: '日卡-5K', daily_50k: '日卡-50K',
                        monthly_5k: '月卡-5K', monthly_50k: '月卡-50K',
                        yearly_5k: '年卡-5K', yearly_50k: '年卡-50K'
                    };
                    const display = document.getElementById('generated-key');
                    display.textContent = `新许可证密钥：${data.key}\n类型：${typeLabels[data.type] || data.type}\n额度：${data.dailyQuota >= 50000 ? '5万' : '5千'}字符/天\n邮箱：${email || '未填写'}\n有效期至：${data.expireDate}`;
                    display.style.display = 'block';
                    loadStats();
                    loadLicenses();
                    document.getElementById('note-input').value = '';
                    document.getElementById('fingerprint-input').value = '';
                    document.getElementById('email-input').value = '';
                } else {
                    alert(data.message || '生成失败');
                }
            });
        }

        function showResetModal(key) {
            currentResetKey = key;
            document.getElementById('reset-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('reset-modal').style.display = 'none';
            currentResetKey = '';
        }

        function confirmReset() {
            fetch(`${API_BASE}/reset`, {
                method: 'POST',
                headers: getHeaders(),
                body: JSON.stringify({ key: currentResetKey })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    alert('重置成功');
                    loadLicenses();
                } else {
                    alert(data.message || '重置失败');
                }
                closeModal();
            });
        }

        function disableKey(key) {
            if (!confirm('确定要禁用此许可证吗？')) return;
            fetch(`${API_BASE}/disable`, {
                method: 'POST',
                headers: getHeaders(),
                body: JSON.stringify({ key })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    loadStats();
                    loadLicenses();
                } else {
                    alert(data.message || '禁用失败');
                }
            });
        }

        function showDeleteModal(key) {
            currentDeleteKey = key;
            document.getElementById('delete-key-hint').textContent = '...-' + key.slice(-6);
            document.getElementById('delete-confirm-input').value = '';
            document.getElementById('delete-modal').style.display = 'flex';
        }

        function closeDeleteModal() {
            document.getElementById('delete-modal').style.display = 'none';
            currentDeleteKey = '';
            document.getElementById('delete-confirm-input').value = '';
        }

        function confirmDelete() {
            const confirmValue = document.getElementById('delete-confirm-input').value.trim();
            const expected = currentDeleteKey.slice(-6);
            if (confirmValue !== expected) {
                alert('输入的密钥后6位不正确，请重新输入');
                return;
            }
            fetch(`${API_BASE}/delete`, {
                method: 'POST',
                headers: getHeaders(),
                body: JSON.stringify({ key: currentDeleteKey })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    alert('删除成功');
                    loadStats();
                    loadLicenses();
                } else {
                    alert(data.message || '删除失败');
                }
                closeDeleteModal();
            });
        }

        if (localStorage.getItem('token')) {
            document.getElementById('login-container').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            loadStats();
            loadLicenses();
        }
    </script>
</body>
</html>
