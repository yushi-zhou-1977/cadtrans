<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CadTrans - 管理员后台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: #f5f7fa; min-height: 100vh; }
        .login-container { display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-box { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); width: 400px; }
        .login-box h2 { text-align: center; color: #333; margin-bottom: 30px; font-size: 1.8rem; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #666; font-weight: bold; }
        .form-group input, .form-group select { width: 100%; padding: 12px 15px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 1rem; transition: border-color 0.3s; }
        .form-group input:focus, .form-group select:focus { border-color: #667eea; outline: none; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: all 0.3s; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4); }
        .btn-success { background: #28a745; color: white; }
        .btn-success:hover { background: #218838; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-danger:hover { background: #c82333; }
        .btn-warning { background: #ffc107; color: #333; }
        .btn-warning:hover { background: #e0a800; }
        .btn-sm { padding: 10px 25px; font-size: 1rem; display: inline-block; width: auto; }
        .error { color: #dc3545; margin-top: 10px; text-align: center; }
        .dashboard { display: none; }
        .dashboard-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; }
        .dashboard-header h1 { font-size: 1.5rem; }
        .dashboard-header .logout-btn { background: rgba(255,255,255,0.2); color: white; padding: 8px 20px; border-radius: 20px; text-decoration: none; font-size: 0.9rem; cursor: pointer; }
        .dashboard-header .logout-btn:hover { background: rgba(255,255,255,0.3); }
        .dashboard-content { padding: 30px; max-width: 1200px; margin: 0 auto; }
        .card { background: white; border-radius: 12px; padding: 25px; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .card h3 { color: #333; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid #667eea; }
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        table th, table td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        table th { background: #f8f9fa; font-weight: bold; color: #333; }
        table tr:hover { background: #f8f9fa; }
        .key-display { background: #2d3748; color: #e2e8f0; padding: 15px; border-radius: 8px; font-family: 'Courier New', monospace; font-size: 1.1rem; text-align: center; margin: 15px 0; word-break: break-all; white-space: pre-wrap; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .stat-item { background: white; border-radius: 12px; padding: 25px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .stat-item .number { font-size: 2.5rem; color: #667eea; font-weight: bold; }
        .stat-item .label { color: #666; margin-top: 5px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; padding: 30px; border-radius: 12px; width: 90%; max-width: 500px; }
        .modal-content h3 { margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="login-container" id="login-container">
        <div class="login-box">
            <h2>管理员登录</h2>
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="username" placeholder="请输入用户名">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" placeholder="请输入密码">
            </div>
            <button class="btn btn-primary" onclick="login()">登录</button>
            <div class="error" id="login-error"></div>
        </div>
    </div>

    <div class="dashboard" id="dashboard">
        <div class="dashboard-header">
            <h1>CadTrans 管理后台</h1>
            <a class="logout-btn" onclick="logout()">退出登录</a>
        </div>
        <div class="dashboard-content">
            <div class="stats">
                <div class="stat-item">
                    <div class="number" id="stat-total">0</div>
                    <div class="label">总许可证数</div>
                </div>
                <div class="stat-item">
                    <div class="number" id="stat-active">0</div>
                    <div class="label">活跃许可证</div>
                </div>
                <div class="stat-item">
                    <div class="number" id="stat-expired">0</div>
                    <div class="label">已过期</div>
                </div>
            </div>

            <div class="card">
                <h3>生成新许可证</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>许可证类型</label>
                        <select id="type-select">
                            <option value="daily_5k">日卡-5K (10元/天) - 5000字符/天</option>
                            <option value="daily_50k">日卡-50K (50元/天) - 50000字符/天</option>
                            <option value="monthly_5k">月卡-5K (150元/月) - 5000字符/天</option>
                            <option value="monthly_50k">月卡-50K (750元/月) - 50000字符/天</option>
                            <option value="yearly_5k" selected>年卡-5K (900元/年) - 5000字符/天</option>
                            <option value="yearly_50k">年卡-50K (4500元/年) - 50000字符/天</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>备注</label>
                        <input type="text" id="note-input" placeholder="用户备注信息">
                    </div>
                </div>
                <button class="btn btn-success btn-sm" onclick="generateKey()">生成许可证</button>
                <div id="generated-key" class="key-display" style="display:none;"></div>
            </div>

            <div class="card">
                <h3>许可证列表</h3>
                <table>
                    <thead>
                        <tr>
                            <th>密钥</th>
                            <th>类型</th>
                            <th>额度</th>
                            <th>有效期至</th>
                            <th>状态</th>
                            <th>绑定机器</th>
                            <th>备注</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="license-table">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal" id="reset-modal">
        <div class="modal-content">
            <h3>重置机器绑定</h3>
            <p>确定要重置此许可证的机器绑定吗？用户将可以在新电脑上激活。</p>
            <button class="btn btn-danger" onclick="confirmReset()">确认重置</button>
            <button class="btn" style="margin-left:10px;background:#ccc;" onclick="closeModal()">取消</button>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let currentResetKey = '';

        function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            fetch(`${API_BASE}/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    localStorage.setItem('token', data.token);
                    document.getElementById('login-container').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'block';
                    loadStats();
                    loadLicenses();
                } else {
                    document.getElementById('login-error').textContent = data.message || '登录失败';
                }
            })
            .catch(() => {
                document.getElementById('login-error').textContent = '网络错误';
            });
        }

        function logout() {
            localStorage.removeItem('token');
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('login-container').style.display = 'flex';
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
        }

        function getHeaders() {
            return {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${localStorage.getItem('token')}`
            };
        }

        function loadStats() {
            fetch(`${API_BASE}/stats`, { headers: getHeaders() })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    document.getElementById('stat-total').textContent = data.total;
                    document.getElementById('stat-active').textContent = data.active;
                    document.getElementById('stat-expired').textContent = data.expired;
                }
            });
        }

        function loadLicenses() {
            const typeLabels = {
                daily_5k: '日卡-5K', daily_50k: '日卡-50K',
                monthly_5k: '月卡-5K', monthly_50k: '月卡-50K',
                yearly_5k: '年卡-5K', yearly_50k: '年卡-50K',
                legacy: '旧版'
            };
            fetch(`${API_BASE}/licenses`, { headers: getHeaders() })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    const tbody = document.getElementById('license-table');
                    tbody.innerHTML = '';
                    data.licenses.forEach(lic => {
                        const tr = document.createElement('tr');
                        const typeLabel = typeLabels[lic.type] || lic.type || '旧版';
                        const quotaLabel = lic.dailyQuota ? (lic.dailyQuota >= 50000 ? '5万/天' : '5千/天') : '-';
                        tr.innerHTML = `
                            <td style="font-family: monospace;">${lic.key}</td>
                            <td>${typeLabel}</td>
                            <td>${quotaLabel}</td>
                            <td>${lic.expireDate}</td>
                            <td><span style="color: ${lic.status === 'active' ? '#28a745' : '#dc3545'}">${lic.status === 'active' ? '活跃' : '已禁用'}</span></td>
                            <td>${lic.fingerprint || '未绑定'}</td>
                            <td>${lic.note || '-'}</td>
                            <td>
                                <button class="btn btn-warning btn-sm" onclick="showResetModal('${lic.key}')" style="margin-right:5px;">重置绑定</button>
                                <button class="btn btn-danger btn-sm" onclick="disableKey('${lic.key}')">禁用</button>
                            </td>
                        `;
                        tbody.appendChild(tr);
                    });
                }
            });
        }

        function generateKey() {
            const type = document.getElementById('type-select').value;
            const note = document.getElementById('note-input').value;
            fetch(`${API_BASE}/generate`, {
                method: 'POST',
                headers: getHeaders(),
                body: JSON.stringify({ type, note })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    const typeLabels = {
                        daily_5k: '日卡-5K', daily_50k: '日卡-50K',
                        monthly_5k: '月卡-5K', monthly_50k: '月卡-50K',
                        yearly_5k: '年卡-5K', yearly_50k: '年卡-50K'
                    };
                    const display = document.getElementById('generated-key');
                    display.textContent = `新许可证密钥：${data.key}\n类型：${typeLabels[data.type] || data.type}\n额度：${data.dailyQuota >= 50000 ? '5万' : '5千'}字符/天\n有效期至：${data.expireDate}`;
                    display.style.display = 'block';
                    loadStats();
                    loadLicenses();
                    document.getElementById('note-input').value = '';
                } else {
                    alert(data.message || '生成失败');
                }
            });
        }

        function showResetModal(key) {
            currentResetKey = key;
            document.getElementById('reset-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('reset-modal').style.display = 'none';
            currentResetKey = '';
        }

        function confirmReset() {
            fetch(`${API_BASE}/reset`, {
                method: 'POST',
                headers: getHeaders(),
                body: JSON.stringify({ key: currentResetKey })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    alert('重置成功');
                    loadLicenses();
                } else {
                    alert(data.message || '重置失败');
                }
                closeModal();
            });
        }

        function disableKey(key) {
            if (!confirm('确定要禁用此许可证吗？')) return;
            fetch(`${API_BASE}/disable`, {
                method: 'POST',
                headers: getHeaders(),
                body: JSON.stringify({ key })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    loadStats();
                    loadLicenses();
                } else {
                    alert(data.message || '禁用失败');
                }
            });
        }

        if (localStorage.getItem('token')) {
            document.getElementById('login-container').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            loadStats();
            loadLicenses();
        }
    </script>
</body>
</html>
