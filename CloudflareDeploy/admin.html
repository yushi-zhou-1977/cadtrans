<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CadTrans - 管理员后台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --warm-50: #fef9f3; --warm-100: #fdf0e3; --warm-200: #fbe0c4;
            --warm-300: #f7c899; --warm-400: #f0a563; --warm-500: #e8873a;
            --warm-600: #d4692a; --warm-700: #b04f22; --warm-800: #8c3e1f;
            --deep-800: #1e293b; --deep-700: #334155; --deep-600: #475569;
            --deep-500: #64748b; --deep-400: #94a3b8;
            --emerald-600: #059669; --emerald-700: #047857;
            --rose-500: #f43f5e; --rose-600: #e11d48;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', 'Noto Sans SC', sans-serif; background: var(--warm-50); min-height: 100vh; color: var(--deep-800); }

        /* ===== LOGIN ===== */
        .login-container {
            display: flex; align-items: center; justify-content: center;
            height: 100vh; background: linear-gradient(165deg, var(--warm-50), var(--warm-100) 40%, #fde8d0);
            position: relative; overflow: hidden;
        }
        .login-container::before {
            content: ''; position: absolute; top: -150px; right: -150px;
            width: 400px; height: 400px; border-radius: 50%;
            background: radial-gradient(circle, rgba(232,135,58,0.15), transparent 70%);
        }
        .login-box {
            background: white; padding: 48px 40px; border-radius: 24px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.08); width: 420px;
            position: relative; z-index: 2; border: 1px solid rgba(0,0,0,0.04);
        }
        .login-box::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
            background: linear-gradient(90deg, var(--warm-400), var(--warm-600));
            border-radius: 24px 24px 0 0;
        }
        .login-logo { text-align: center; margin-bottom: 32px; }
        .login-logo h2 { font-size: 1.8rem; font-weight: 900; letter-spacing: -0.03em; color: var(--deep-800); }
        .login-logo h2 span { color: var(--warm-500); }
        .login-logo p { color: var(--deep-400); font-size: 0.85rem; margin-top: 4px; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 6px; color: var(--deep-600); font-weight: 600; font-size: 0.85rem; }
        .form-group input, .form-group select {
            width: 100%; padding: 12px 16px; border: 2px solid #e2e8f0;
            border-radius: 12px; font-size: 0.95rem; font-family: inherit;
            transition: border-color 0.3s, box-shadow 0.3s; background: var(--warm-50);
        }
        .form-group input:focus, .form-group select:focus {
            border-color: var(--warm-400); outline: none;
            box-shadow: 0 0 0 3px rgba(232,135,58,0.1); background: white;
        }

        .btn {
            padding: 12px 24px; border: none; border-radius: 12px;
            font-size: 0.95rem; font-weight: 700; cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16,1,0.3,1); font-family: inherit;
        }
        .btn-full { width: 100%; }
        .btn-primary {
            background: linear-gradient(135deg, var(--warm-500), var(--warm-700));
            color: white; box-shadow: 0 4px 15px rgba(232,135,58,0.3);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(232,135,58,0.4); }
        .btn-success {
            background: linear-gradient(135deg, var(--emerald-600), var(--emerald-700));
            color: white; box-shadow: 0 4px 15px rgba(5,150,105,0.3);
        }
        .btn-success:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(5,150,105,0.4); }
        .btn-danger {
            background: linear-gradient(135deg, var(--rose-500), var(--rose-600));
            color: white; box-shadow: 0 4px 15px rgba(244,63,94,0.3);
        }
        .btn-danger:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(244,63,94,0.4); }
        .btn-warning {
            background: linear-gradient(135deg, var(--warm-400), var(--warm-600));
            color: white; box-shadow: 0 4px 15px rgba(232,135,58,0.25);
        }
        .btn-warning:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(232,135,58,0.35); }
        .btn-ghost {
            background: var(--warm-100); color: var(--warm-700);
        }
        .btn-ghost:hover { background: var(--warm-200); }
        .btn-sm { padding: 8px 16px; font-size: 0.82rem; display: inline-block; width: auto; border-radius: 8px; }

        .error { color: var(--rose-500); margin-top: 12px; text-align: center; font-size: 0.9rem; font-weight: 500; }

        /* ===== DASHBOARD ===== */
        .dashboard { display: none; }
        .dash-header {
            background: white; border-bottom: 1px solid rgba(0,0,0,0.06);
            padding: 0 32px; height: 72px;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100;
            box-shadow: 0 2px 20px rgba(0,0,0,0.04);
        }
        .dash-logo { font-size: 1.4rem; font-weight: 800; letter-spacing: -0.03em; }
        .dash-logo span { color: var(--warm-500); }
        .dash-logo small { color: var(--deep-400); font-size: 0.75rem; font-weight: 500; margin-left: 8px; }
        .dash-actions { display: flex; align-items: center; gap: 12px; }
        .logout-btn {
            background: var(--warm-50); color: var(--deep-600);
            padding: 8px 20px; border-radius: 10px; font-size: 0.85rem;
            font-weight: 600; cursor: pointer; border: 1px solid rgba(0,0,0,0.06);
            transition: all 0.2s;
        }
        .logout-btn:hover { background: var(--warm-100); color: var(--warm-700); }
        .home-link { color: var(--deep-400); text-decoration: none; font-size: 0.85rem; font-weight: 500; transition: color 0.2s; }
        .home-link:hover { color: var(--warm-500); }

        .dash-content { padding: 32px; max-width: 1280px; margin: 0 auto; }

        /* ===== STATS ===== */
        .stats {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 32px;
        }
        .stat-card {
            background: white; border-radius: 16px; padding: 24px; text-align: center;
            border: 1px solid rgba(0,0,0,0.04);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .stat-card:hover { transform: translateY(-4px); box-shadow: 0 10px 30px rgba(0,0,0,0.06); }
        .stat-num {
            font-size: 2.8rem; font-weight: 900; line-height: 1;
            background: linear-gradient(135deg, var(--warm-500), var(--warm-700));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .stat-label { color: var(--deep-400); font-size: 0.85rem; font-weight: 500; margin-top: 8px; }

        /* ===== CARD ===== */
        .card {
            background: white; border-radius: 20px; padding: 28px; margin-bottom: 24px;
            border: 1px solid rgba(0,0,0,0.04);
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
        }
        .card-title {
            font-size: 1.1rem; font-weight: 700; color: var(--deep-800);
            margin-bottom: 20px; padding-bottom: 12px;
            border-bottom: 2px solid var(--warm-200);
            display: flex; align-items: center; gap: 8px;
        }
        .card-title .icon { font-size: 1.2rem; }

        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; }

        /* ===== KEY DISPLAY ===== */
        .key-display {
            background: linear-gradient(135deg, var(--deep-800), #0f172a);
            color: #e2e8f0; padding: 20px; border-radius: 14px;
            font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
            font-size: 1rem; text-align: center; margin: 16px 0;
            word-break: break-all; white-space: pre-wrap; line-height: 1.6;
            border: 1px solid rgba(255,255,255,0.08);
        }

        /* ===== TABLE ===== */
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 0.9rem; }
        table th {
            padding: 12px 14px; text-align: left; font-weight: 700; font-size: 0.8rem;
            color: var(--deep-500); text-transform: uppercase; letter-spacing: 0.05em;
            border-bottom: 2px solid var(--warm-100); background: var(--warm-50);
        }
        table td { padding: 12px 14px; border-bottom: 1px solid #f1f5f9; color: var(--deep-700); }
        table tr { transition: background 0.15s; }
        table tr:hover { background: var(--warm-50); }
        .status-active { color: var(--emerald-600); font-weight: 600; }
        .status-disabled { color: var(--rose-500); font-weight: 600; }

        /* ===== MODAL ===== */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15,23,42,0.5); backdrop-filter: blur(4px);
            align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-content {
            background: white; padding: 32px; border-radius: 20px;
            width: 90%; max-width: 480px; box-shadow: 0 25px 60px rgba(0,0,0,0.2);
        }
        .modal-content h3 { margin-bottom: 16px; font-size: 1.2rem; font-weight: 700; color: var(--deep-800); }
        .modal-content p { color: var(--deep-500); font-size: 0.95rem; line-height: 1.6; margin-bottom: 12px; }
        .modal-actions { display: flex; gap: 10px; margin-top: 20px; }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .stats { grid-template-columns: 1fr; }
            .form-row { grid-template-columns: 1fr; }
            .dash-content { padding: 20px; }
            .login-box { margin: 20px; padding: 32px 24px; }
        }
    </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-container" id="login-container">
    <div class="login-box">
        <div class="login-logo">
            <h2>Cad<span>Trans</span></h2>
            <p>管理员后台登录</p>
        </div>
        <div class="form-group">
            <label>用户名</label>
            <input type="text" id="username" placeholder="请输入用户名">
        </div>
        <div class="form-group">
            <label>密码</label>
            <input type="password" id="password" placeholder="请输入密码">
        </div>
        <button class="btn btn-primary btn-full" onclick="login()">登录</button>
        <div class="error" id="login-error"></div>
    </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">
    <div class="dash-header">
        <div class="dash-logo">Cad<span>Trans</span> <small>管理后台</small></div>
        <div class="dash-actions">
            <a href="/" class="home-link">返回前台</a>
            <button class="logout-btn" onclick="logout()">退出登录</button>
        </div>
    </div>
    <div class="dash-content">
        <div class="stats">
            <div class="stat-card">
                <div class="stat-num" id="stat-total">0</div>
                <div class="stat-label">总许可证数</div>
            </div>
            <div class="stat-card">
                <div class="stat-num" id="stat-active">0</div>
                <div class="stat-label">活跃许可证</div>
            </div>
            <div class="stat-card">
                <div class="stat-num" id="stat-expired">0</div>
                <div class="stat-label">已过期</div>
            </div>
        </div>

        <div class="card">
            <div class="card-title"><span class="icon">&#128230;</span> 程序文件管理</div>
            <div id="dll-current-info" style="margin-bottom:16px;padding:16px;background:var(--warm-50);border-radius:12px;font-size:0.9rem;display:none;">
                <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
                    <span style="font-weight:700;color:var(--deep-800);">当前版本信息</span>
                    <span id="dll-status-badge" style="padding:2px 10px;border-radius:6px;font-size:0.75rem;font-weight:600;background:var(--emerald-600);color:white;">已上传</span>
                </div>
                <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:8px;color:var(--deep-600);">
                    <div>文件名：<strong id="dll-filename">-</strong></div>
                    <div>版本号：<strong id="dll-version">-</strong></div>
                    <div>大小：<strong id="dll-size">-</strong></div>
                    <div>上传时间：<strong id="dll-upload-date">-</strong></div>
                </div>
                <div style="margin-top:8px;color:var(--deep-400);font-size:0.82rem;" id="dll-changelog"></div>
            </div>
            <div class="form-row" style="margin-bottom:16px;">
                <div class="form-group">
                    <label>选择 DLL 文件</label>
                    <input type="file" id="dll-file-input" accept=".dll" style="padding:10px;">
                </div>
                <div class="form-group">
                    <label>版本号</label>
                    <input type="text" id="dll-version-input" placeholder="例如：1.2.0">
                </div>
            </div>
            <div class="form-group" style="margin-bottom:16px;">
                <label>更新日志</label>
                <input type="text" id="dll-changelog-input" placeholder="本次更新的内容说明">
            </div>
            <button class="btn btn-success" onclick="uploadDll()">上传新版本</button>
        </div>

        <div class="card">
            <div class="card-title"><span class="icon">&#9999;</span> 生成新许可证</div>
            <div class="form-row">
                <div class="form-group">
                    <label>许可证类型</label>
                    <select id="type-select">
                        <option value="daily_5k">日卡-5K (10元/天) - 5000字符/天</option>
                        <option value="daily_50k">日卡-50K (50元/天) - 50000字符/天</option>
                        <option value="monthly_5k">月卡-5K (150元/月) - 5000字符/天</option>
                        <option value="monthly_50k">月卡-50K (750元/月) - 50000字符/天</option>
                        <option value="yearly_5k" selected>年卡-5K (900元/年) - 5000字符/天</option>
                        <option value="yearly_50k">年卡-50K (4500元/年) - 50000字符/天</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>用户邮箱（50K套餐必填）</label>
                    <input type="email" id="email-input" placeholder="用户邮箱地址">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>机器指纹码（必填，由用户提供）</label>
                    <input type="text" id="fingerprint-input" placeholder="用户在CAD插件中显示的指纹码" style="font-family: 'SF Mono','Fira Code',monospace;">
                </div>
                <div class="form-group">
                    <label>备注</label>
                    <input type="text" id="note-input" placeholder="用户备注信息">
                </div>
            </div>
            <button class="btn btn-success" onclick="generateKey()">生成许可证</button>
            <div id="generated-key" class="key-display" style="display:none;"></div>
        </div>

        <div class="card">
            <div class="card-title"><span class="icon">&#128203;</span> 许可证列表</div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>密钥</th>
                            <th>类型</th>
                            <th>额度</th>
                            <th>有效期至</th>
                            <th>状态</th>
                            <th>邮箱</th>
                            <th>绑定机器</th>
                            <th>备注</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="license-table"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- RESET MODAL -->
<div class="modal" id="reset-modal">
    <div class="modal-content">
        <h3>重置机器绑定</h3>
        <p>确定要重置此许可证的机器绑定吗？用户将可以在新电脑上激活。</p>
        <div class="modal-actions">
            <button class="btn btn-warning" onclick="confirmReset()">确认重置</button>
            <button class="btn btn-ghost" onclick="closeModal()">取消</button>
        </div>
    </div>
</div>

<!-- DELETE MODAL -->
<div class="modal" id="delete-modal">
    <div class="modal-content">
        <h3>删除许可证</h3>
        <p style="color:var(--rose-500);font-weight:600;margin-bottom:12px;">警告：此操作不可恢复！许可证将被永久删除。</p>
        <p>请输入密钥后6位以确认删除：<span id="delete-key-hint" style="font-family:'SF Mono','Fira Code',monospace;font-weight:700;color:var(--warm-600);"></span></p>
        <input type="text" id="delete-confirm-input" placeholder="输入密钥后6位" style="width:100%;padding:10px 14px;margin:10px 0 0;border:2px solid #e2e8f0;border-radius:10px;font-family:'SF Mono','Fira Code',monospace;font-size:0.95rem;background:var(--warm-50);">
        <div class="modal-actions">
            <button class="btn btn-danger" onclick="confirmDelete()">确认删除</button>
            <button class="btn btn-ghost" onclick="closeDeleteModal()">取消</button>
        </div>
    </div>
</div>

<script>
    const API_BASE = '/api';
    let currentResetKey = '';
    let currentDeleteKey = '';

    function login() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        fetch(`${API_BASE}/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                localStorage.setItem('token', data.token);
                document.getElementById('login-container').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                loadStats();
                loadLicenses();
                loadDllInfo();
            } else {
                document.getElementById('login-error').textContent = data.message || '登录失败';
            }
        })
        .catch(() => {
            document.getElementById('login-error').textContent = '网络错误';
        });
    }

    function logout() {
        localStorage.removeItem('token');
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('login-container').style.display = 'flex';
        document.getElementById('username').value = '';
        document.getElementById('password').value = '';
    }

    function getHeaders() {
        return {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${localStorage.getItem('token')}`
        };
    }

    function loadDllInfo() {
        fetch(`${API_BASE}/upload`, { headers: getHeaders() })
        .then(res => res.json())
        .then(data => {
            if (data.success && data.metadata) {
                const m = data.metadata;
                const sizeMB = (m.size / 1024 / 1024).toFixed(2);
                document.getElementById('dll-current-info').style.display = 'block';
                document.getElementById('dll-filename').textContent = m.filename || '-';
                document.getElementById('dll-version').textContent = m.version || '-';
                document.getElementById('dll-size').textContent = sizeMB + ' MB';
                document.getElementById('dll-upload-date').textContent = m.uploadDate ? m.uploadDate.split('T')[0] : '-';
                document.getElementById('dll-changelog').textContent = m.changelog ? '更新日志：' + m.changelog : '';
            } else {
                document.getElementById('dll-current-info').style.display = 'none';
            }
        })
        .catch(() => { document.getElementById('dll-current-info').style.display = 'none'; });
    }

    function uploadDll() {
        const fileInput = document.getElementById('dll-file-input');
        const version = document.getElementById('dll-version-input').value.trim();
        const changelog = document.getElementById('dll-changelog-input').value.trim();
        if (!fileInput.files || fileInput.files.length === 0) {
            alert('请选择DLL文件');
            return;
        }
        const formData = new FormData();
        formData.append('file', fileInput.files[0]);
        formData.append('version', version);
        formData.append('changelog', changelog);
        fetch(`${API_BASE}/upload`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` },
            body: formData
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                alert('上传成功！');
                loadDllInfo();
                document.getElementById('dll-file-input').value = '';
                document.getElementById('dll-version-input').value = '';
                document.getElementById('dll-changelog-input').value = '';
            } else {
                alert(data.message || '上传失败');
            }
        })
        .catch(() => { alert('网络错误'); });
    }

    function loadStats() {
        fetch(`${API_BASE}/stats`, { headers: getHeaders() })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                document.getElementById('stat-total').textContent = data.total;
                document.getElementById('stat-active').textContent = data.active;
                document.getElementById('stat-expired').textContent = data.expired;
            }
        });
    }

    function loadLicenses() {
        const typeLabels = {
            daily_5k: '日卡-5K', daily_50k: '日卡-50K',
            monthly_5k: '月卡-5K', monthly_50k: '月卡-50K',
            yearly_5k: '年卡-5K', yearly_50k: '年卡-50K',
            legacy: '旧版'
        };
        fetch(`${API_BASE}/licenses`, { headers: getHeaders() })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                const tbody = document.getElementById('license-table');
                tbody.innerHTML = '';
                data.licenses.forEach(lic => {
                    const tr = document.createElement('tr');
                    const typeLabel = typeLabels[lic.type] || lic.type || '旧版';
                    const quotaLabel = lic.dailyQuota ? (lic.dailyQuota >= 50000 ? '5万/天' : '5千/天') : '-';
                    const statusClass = lic.status === 'active' ? 'status-active' : 'status-disabled';
                    const statusText = lic.status === 'active' ? '活跃' : '已禁用';
                    const fpDisplay = lic.fingerprint ? (lic.fingerprint.length > 12 ? lic.fingerprint.substring(0, 12) + '...' : lic.fingerprint) : '未绑定';
                    tr.innerHTML = `
                        <td style="font-family:'SF Mono','Fira Code',monospace;font-size:0.85em;">${lic.key}</td>
                        <td>${typeLabel}</td>
                        <td>${quotaLabel}</td>
                        <td>${lic.expireDate}</td>
                        <td><span class="${statusClass}">${statusText}</span></td>
                        <td>${lic.email || '-'}</td>
                        <td style="font-family:'SF Mono','Fira Code',monospace;font-size:0.82em;">${fpDisplay}</td>
                        <td>${lic.note || '-'}</td>
                        <td style="white-space:nowrap;">
                            <button class="btn btn-warning btn-sm" onclick="showResetModal('${lic.key}')">重置</button>
                            <button class="btn btn-danger btn-sm" onclick="disableKey('${lic.key}')">禁用</button>
                            <button class="btn btn-sm" style="background:var(--deep-400);color:white;" onclick="showDeleteModal('${lic.key}')">删除</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            }
        });
    }

    function generateKey() {
        const type = document.getElementById('type-select').value;
        const note = document.getElementById('note-input').value;
        const fingerprint = document.getElementById('fingerprint-input').value.trim();
        const email = document.getElementById('email-input').value.trim();
        if (!fingerprint) { alert('请输入用户提供的机器指纹码'); return; }
        if ((type === 'daily_50k' || type === 'monthly_50k' || type === 'yearly_50k') && !email) { alert('50K套餐必须填写用户邮箱'); return; }
        fetch(`${API_BASE}/generate`, {
            method: 'POST',
            headers: getHeaders(),
            body: JSON.stringify({ type, note, fingerprint, email })
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                const typeLabels = {
                    daily_5k: '日卡-5K', daily_50k: '日卡-50K',
                    monthly_5k: '月卡-5K', monthly_50k: '月卡-50K',
                    yearly_5k: '年卡-5K', yearly_50k: '年卡-50K'
                };
                const display = document.getElementById('generated-key');
                display.textContent = `新许可证密钥：${data.key}\n类型：${typeLabels[data.type] || data.type}\n额度：${data.dailyQuota >= 50000 ? '5万' : '5千'}字符/天\n邮箱：${email || '未填写'}\n有效期至：${data.expireDate}`;
                display.style.display = 'block';
                loadStats();
                loadLicenses();
                document.getElementById('note-input').value = '';
                document.getElementById('fingerprint-input').value = '';
                document.getElementById('email-input').value = '';
            } else {
                alert(data.message || '生成失败');
            }
        });
    }

    function showResetModal(key) {
        currentResetKey = key;
        document.getElementById('reset-modal').style.display = 'flex';
    }
    function closeModal() {
        document.getElementById('reset-modal').style.display = 'none';
        currentResetKey = '';
    }
    function confirmReset() {
        fetch(`${API_BASE}/reset`, {
            method: 'POST', headers: getHeaders(),
            body: JSON.stringify({ key: currentResetKey })
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) { alert('重置成功'); loadLicenses(); }
            else { alert(data.message || '重置失败'); }
            closeModal();
        });
    }

    function disableKey(key) {
        if (!confirm('确定要禁用此许可证吗？')) return;
        fetch(`${API_BASE}/disable`, {
            method: 'POST', headers: getHeaders(),
            body: JSON.stringify({ key })
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) { loadStats(); loadLicenses(); }
            else { alert(data.message || '禁用失败'); }
        });
    }

    function showDeleteModal(key) {
        currentDeleteKey = key;
        document.getElementById('delete-key-hint').textContent = '...-' + key.slice(-6);
        document.getElementById('delete-confirm-input').value = '';
        document.getElementById('delete-modal').style.display = 'flex';
    }
    function closeDeleteModal() {
        document.getElementById('delete-modal').style.display = 'none';
        currentDeleteKey = '';
        document.getElementById('delete-confirm-input').value = '';
    }
    function confirmDelete() {
        const confirmValue = document.getElementById('delete-confirm-input').value.trim();
        const expected = currentDeleteKey.slice(-6);
        if (confirmValue !== expected) { alert('输入的密钥后6位不正确'); return; }
        fetch(`${API_BASE}/delete`, {
            method: 'POST', headers: getHeaders(),
            body: JSON.stringify({ key: currentDeleteKey })
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) { alert('删除成功'); loadStats(); loadLicenses(); }
            else { alert(data.message || '删除失败'); }
            closeDeleteModal();
        });
    }

    if (localStorage.getItem('token')) {
        document.getElementById('login-container').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        loadStats();
        loadLicenses();
        loadDllInfo();
    }
</script>
</body>
</html>
